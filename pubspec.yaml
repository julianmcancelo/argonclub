name: zuper_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.4.3+14

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  dio: ^5.9.2
  video_player: ^2.11.1
  chewie: ^1.14.1
  cached_network_image: ^3.4.1
  provider: ^6.1.5+1
  webview_flutter: ^4.13.1
  url_launcher: ^6.3.2
  wakelock_plus: ^1.6.1
  flutter_native_splash: ^2.4.7
  google_fonts: ^8.1.0
  webview_windows: ^0.4.0
  shared_preferences: ^2.5.3
  intl: ^0.20.2
  web_socket_channel: ^3.0.3
  dlna_dart: ^0.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icon.png"

flutter_native_splash:
  color: "#000000"
  image: "assets/icon.png"
  android: true
  ios: true
